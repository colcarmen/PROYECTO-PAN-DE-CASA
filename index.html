<!DOCTYPE html>
<!-- La declaración DOCTYPE le dice al navegador que este documento usa HTML5,
     la versión más moderna del lenguaje de páginas web. Siempre va primero. -->
<html lang="es">
<!-- La etiqueta <html> es la raíz de toda la página. El atributo lang="es"
     le indica al navegador (y a los buscadores como Google) que el contenido
     está en español. -->
<head>
  <!-- El bloque <head> contiene información sobre la página que el navegador
       necesita, pero que el usuario NO ve directamente en pantalla. -->

  <!-- charset="UTF-8" permite mostrar caracteres especiales como: á, é, ñ, ü -->
  <meta charset="UTF-8">

  <!-- Esta meta etiqueta hace que la página se vea bien en celulares.
       width=device-width: el ancho se adapta al ancho del dispositivo.
       initial-scale=1.0: no hace zoom automático al cargar. -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- El <title> aparece en la pestaña del navegador y es muy importante
       para el SEO (para que Google encuentre la página). -->
  <title>Catálogo de Productos | Pan de Casa</title>

  <!-- La meta "description" es el texto que Google muestra debajo del título
       en los resultados de búsqueda. -->
  <meta name="description" content="Descubre nuestra selección de panes artesanales, elaborados con masa madre y los mejores ingredientes locales.">

  <!-- Los dos "preconnect" le avisan al navegador con anticipación que se va
       a conectar a los servidores de Google Fonts. Esto hace que la fuente
       cargue más rápido (optimización de rendimiento). -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!-- Aquí se importa la fuente tipográfica "Work Sans" desde Google Fonts.
       Se piden los pesos 400 (normal), 500, 600 y 700 (negrita).
       display=swap evita que el texto sea invisible mientras carga la fuente. -->
  <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- Se enlaza el archivo de estilos CSS principal del proyecto.
       Con rel="stylesheet" le decimos que es una hoja de estilos. -->
  <link rel="stylesheet" href="css/index.css">
</head>
<body>
  <!-- El <body> contiene TODO lo visible de la página: texto, imágenes, botones, etc. -->

  <!-- ============================================================
       BARRA DE NAVEGACIÓN (HEADER)
       La etiqueta <header> es semántica: le dice a navegadores y
       lectores de pantalla que aquí está la cabecera de la página.
  ============================================================ -->
  <header>
    <!-- .container limita el ancho máximo del contenido y lo centra.
         .nav-content organiza el logo y los enlaces en fila (flex). -->
    <div class="container nav-content">

      <!-- Bloque del logo: combina un ícono SVG y el texto "Pan de Casa" -->
      <div class="logo">
        <!-- SVG es un formato de imagen vectorial. Se puede escalar a cualquier
             tamaño sin perder calidad. Este dibuja un escudo. -->
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        </svg>
        Pan de Casa
      </div>

      <!-- <nav> es una etiqueta semántica para menús de navegación.
           Contiene los enlaces principales del sitio. -->
      <nav class="nav-links">
        <!-- class="active" resalta visualmente el enlace de la página actual -->
        <a href="index.html" class="active">Catálogo</a>
        <a href="order-status.html">Mis Pedidos</a>
        <a href="admin/login.html">Admin</a>

        <!-- Enlace al carrito: usa position:relative para poder colocar
             el badge (número de productos) encima del ícono. -->
        <a href="cart.html" class="cart-icon-wrapper">
          <!-- Ícono de carrito de compras dibujado con SVG -->
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="9" cy="21" r="1"></circle>
            <circle cx="20" cy="21" r="1"></circle>
            <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
          </svg>
          <!-- El badge muestra la cantidad de productos en el carrito.
               El id="cart-badge" permite que JavaScript lo actualice dinámicamente. -->
          <span class="badge" id="cart-badge">0</span>
        </a>
      </nav>
    </div>
  </header>

  <!-- ============================================================
       SECCIÓN HERO (BIENVENIDA)
       <section> agrupa contenido temático relacionado.
       La clase "animate-fade-in" aplica una animación CSS de entrada.
  ============================================================ -->
  <section class="hero animate-fade-in">
    <div class="container">
      <!-- <h1> es el título principal de la página. Solo debe haber UNO por página.
           Es el elemento más importante para el SEO. -->
      <h1>El sabor de la tradición en cada rebanada.</h1>
      <!-- <p> es un párrafo de texto descriptivo. -->
      <p>Descubre nuestra selección de panes artesanales, elaborados con masa madre y los mejores ingredientes locales. Horneados frescos cada día.</p>
    </div>
  </section>

  <!-- ============================================================
       CONTENIDO PRINCIPAL (CATÁLOGO DE PRODUCTOS)
       <main> indica el contenido principal de la página (solo uno por página).
       animation-delay: 0.1s hace que esta sección aparezca un poco
       después que el hero, creando un efecto visual escalonado.
  ============================================================ -->
  <main class="container animate-fade-in" style="animation-delay: 0.1s;">
    <!-- Este div es la rejilla (grid) donde se mostrarán las tarjetas de productos.
         El id="productGrid" permite que JavaScript encuentre este elemento
         e inyecte el HTML de los productos automáticamente. -->
    <div class="product-grid" id="productGrid">
      <!-- Los productos son generados aquí por el archivo catalog.js -->
    </div>
  </main>

  <!-- ============================================================
       SCRIPTS DE JAVASCRIPT
       Los scripts se colocan al FINAL del body (antes de </body>)
       para que toda la página cargue primero y luego ejecute el JS.
       El orden importa: store.js debe cargarse antes que catalog.js
       porque catalog.js usa funciones definidas en store.js.
  ============================================================ -->
  <script src="js/store.js"></script>
  <script src="js/catalog.js"></script>
</body>
</html>
