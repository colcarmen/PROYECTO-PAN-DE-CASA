<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestión de Pedidos | Admin Pan de Casa</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/index.css">
</head>
<body>
  <div class="admin-layout">
    <aside class="admin-sidebar">
      <div class="logo mb-4">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        </svg>
        Admin Panel
      </div>
      <nav class="admin-nav">
        <a href="dashboard.html">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
          Dashboard
        </a>
        <a href="orders.html" class="active">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
          Pedidos Activos
        </a>
        <a href="product-form.html">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"></path><line x1="7" y1="7" x2="7.01" y2="7"></line></svg>
          Catálogo
        </a>
      </nav>
      <div style="margin-top: auto;">
        <a href="../index.html" class="btn btn-outline" style="width: 100%;">Volver a Tienda</a>
      </div>
    </aside>

    <main class="admin-content animate-fade-in">
      <div class="d-flex justify-between align-center mb-4">
        <h1>Pedidos Activos</h1>
        <button class="btn btn-primary" onclick="renderTable()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"></polyline><polyline points="1 20 1 14 7 14"></polyline><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path></svg>
          Actualizar
        </button>
      </div>

      <div class="table-wrapper">
        <table id="ordersTable">
          <thead>
            <tr>
              <th>ID Pedido</th>
              <th>Fecha/Hora</th>
              <th>Cliente</th>
              <th>Total</th>
              <th>Estado Actual</th>
              <th>Acción (Avanzar)</th>
            </tr>
          </thead>
          <tbody>
            <!-- Rendered by JS -->
          </tbody>
        </table>
      </div>
    </main>
  </div>

  <script src="../js/store.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      renderTable();
    });

    const STATUS_MAP = {
      'pending': { label: 'Recibido', class: 'status-pending', next: 'prep', nextLabel: 'Preparar' },
      'prep': { label: 'En Preparación', class: 'status-prep', next: 'ready', nextLabel: 'Marcar Listo' },
      'ready': { label: 'Listo para Envío', class: 'status-ready', next: 'delivered', nextLabel: 'Entregar' },
      'delivered': { label: 'Entregado', class: 'status-delivered', next: null, nextLabel: '' }
    };

    function renderTable() {
      const orders = window.AppStore.getOrders();
      const tbody = document.querySelector('#ordersTable tbody');

      if (orders.length === 0) {
        tbody.innerHTML = `<tr><td colspan="6" class="text-center" style="padding: 3rem;">No hay pedidos registrados</td></tr>`;
        return;
      }

      tbody.innerHTML = orders.map(order => {
        const currentStatus = STATUS_MAP[order.status];
        
        let actionBtn = '-';
        if (currentStatus.next) {
          actionBtn = `<button class="btn btn-outline" style="padding: 0.4rem 0.8rem; font-size: 0.85rem;" onclick="updateStatus('${order.id}', '${currentStatus.next}')">${currentStatus.nextLabel}</button>`;
        }

        return `
          <tr>
            <td style="font-weight: 600;">${order.id}</td>
            <td>${window.formatDate(order.createdAt)}</td>
            <td>
              <div style="font-weight: 500;">${order.customer.name}</div>
              <div style="font-size: 0.85rem; color: var(--text-muted);">${order.customer.phone}</div>
            </td>
            <td style="font-weight: 600;">${window.formatCurrency(order.total)}</td>
            <td><span class="status ${currentStatus.class}">${currentStatus.label}</span></td>
            <td>${actionBtn}</td>
          </tr>
        `;
      }).join('');
    }

    function updateStatus(orderId, nextStatus) {
      window.AppStore.updateOrderStatus(orderId, nextStatus);
      renderTable(); // Re-render local table
    }
  </script>
</body>
</html>
