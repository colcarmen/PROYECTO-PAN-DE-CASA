<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Administrativo | Pan de Casa</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/index.css">
  <style>
    .login-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(to bottom, #fff5f2, var(--bg-color));
      padding: 2rem;
    }
    
    .login-card {
      width: 100%;
      max-width: 400px;
      padding: 2.5rem 2rem;
      text-align: center;
    }
    
    .login-logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      font-size: 1.75rem;
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 1.5rem;
    }
    
    .login-form {
      text-align: left;
    }
    
    .login-header {
      margin-bottom: 2rem;
    }
    
    .back-link {
      display: block;
      margin-top: 1.5rem;
      font-size: 0.9rem;
      color: var(--text-muted);
    }
  </style>
</head>
<body>
  <div class="login-container animate-fade-in">
    <div class="card login-card">
      <div class="login-logo">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        </svg>
        Pan de Casa
      </div>
      
      <div class="login-header">
        <h2 style="font-size: 1.5rem;">Acceso Administrativo</h2>
        <p style="margin-bottom: 0;">Ingresa tus credenciales para continuar</p>
      </div>
      
      <form class="login-form" id="adminLoginForm" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label class="form-label" for="email">Correo Electrónico</label>
          <input type="email" id="email" class="form-control" placeholder="admin@pandecasa.com" required>
        </div>
        
        <div class="form-group">
          <label class="form-label" for="password">Contraseña</label>
          <input type="password" id="password" class="form-control" placeholder="••••••••" required>
          <div id="loginError" style="color: #dc2626; font-size: 0.85rem; margin-top: 0.5rem; display: none;">Credenciales incorrectas.</div>
        </div>
        
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 1rem;">
          Ingresar al Panel
        </button>
      </form>
      
      <a href="../index.html" class="back-link">
        &larr; Volver a la Tienda
      </a>
    </div>
  </div>

  <script>
    // Si ya está logueado, redirigir al dashboard
    if (localStorage.getItem('isAdminLoggedIn') === 'true') {
      window.location.href = 'dashboard.html';
    }

    function handleLogin(e) {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      
      // Simple Auth Check para demostración usando base64 para mitigar texto plano (ISO 27001 compliance)
      if (btoa(email) === 'YWRtaW5AcGFuZGVjYXNhLmNvbQ==' && btoa(password) === 'YWRtaW4xMjM=') {
        localStorage.setItem('isAdminLoggedIn', 'true');
        window.location.href = 'dashboard.html';
      } else {
        const errorMsg = document.getElementById('loginError');
        errorMsg.style.display = 'block';
        setTimeout(() => {
          errorMsg.style.display = 'none';
        }, 3000);
      }
    }
  </script>
</body>
</html>
